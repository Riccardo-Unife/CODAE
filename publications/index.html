<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="CODAE Publications">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODAE – Publications</title>

    <link rel="alternate" hreflang="it" href="../it/publications">
    <link rel="alternate" hreflang="en" href="../publications">

    <link rel="stylesheet" href="../assets/style.css">
    <script src="../assets/publications-data.js"></script>
    <script src="../assets/script.js" defer></script>

    <link rel="icon" href="../logo/logo_codae.svg?v=1" type="image/svg+xml">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <!-- HEADER ----------------------------------------------------------------------------------->
    <header>
        <div class="container">
            <a href="../">
                <img src="../logo/logo_codae.svg" alt="Logo" id="logo">
            </a>
            <nav class="nav">
                <a href="../research/"      class="headerBtn">Research</a>
                <a href="../teaching/"      class="headerBtn">Teaching</a>
                <a href="../publications/"  class="headerBtn">Publications</a>
                <a href="../tools/"         class="headerBtn">Tools</a>
                <a href="../team/"          class="headerBtn">Team</a>
            </nav>
            <div class="header-right">
                <a href="https://linkedin.com" class="icon linkedin" target="_blank">
                    <i class="fa-brands fa-linkedin"></i>
                </a>
                <a href="../it/publications" id="switch-lang">IT</a>
            </div>
            <div class="hamburger" onclick="toggleMenu()">&lt;</div>
        </div>
    </header>

    <!-- HERO ------------------------------------------------------------------------------------->
    <section class="hero hero-section">
        <div class="container">
            <h1 class="section-title">&gt; Publications <span class="cursor-code">_</span></h1>

            <div class="hero-buttons">
                <input type="text" id="search-input" placeholder="// search title, author, tag...">
                <a href="#" class="btn primary"   data-filter="all">Show all</a>
                <a href="#" class="btn secondary" data-filter="journal">Journal</a>
                <a href="#" class="btn secondary" data-filter="conference">Conference</a>
                <a href="#" class="btn secondary" data-filter="book chapter">Book chapter</a>
            </div>
        </div>
    </section>

    <!-- PUBLICATIONS LIST ------------------------------------------------------------------------>
    <section class="cont-section">
        <div class="container">
            <div id="pub-list"></div>
            <p id="no-results">// no results found.</p>
        </div>
    </section>

    <!-- FOOTER ----------------------------------------------------------------------------------->
    <footer>
        <div class="container">
            <p>CODAE - Computational Optimization for Design of Architecture and Engineering<br>
            A research group of the University of Ferrara</p>
            <p class="mono">build.version 1.0.0</p>
        </div>
    </footer>
</body>
</html>
